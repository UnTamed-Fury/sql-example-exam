<!DOCTYPE html>
<html>
<head>
    <title>MySQL DML Examples</title>
</head>
<body>

    <h1>MySQL DML Command Examples</h1>

    <h2>1. INSERT</h2>
    <pre>
INSERT INTO students (id, name, marks)
VALUES (1, 'Rahul', 85);
    </pre>

    <h2>2. SELECT</h2>
    <pre>
SELECT * FROM students;
    </pre>

    <h2>3. UPDATE</h2>
    <pre>
UPDATE students
SET marks = 90
WHERE id = 2;
    </pre>

    <h2>4. DELETE</h2>
    <pre>
DELETE FROM students
WHERE id = 3;
    </pre>

</body>
</html>
